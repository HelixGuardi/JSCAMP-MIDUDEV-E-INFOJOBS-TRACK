<!-- Hyper Text Markup Language (HTML) -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevJobs - Empleos</title>
    <meta
      name="description"
      content="Listado con empleos y filtros para encontrar el trabajo de tus sueños."
    />
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./main.js"></script>
    <!-- type='module' o 'defer' a secas-->
  </head>
  <body>
    <header>
      <h1>
        <svg
          fill="none"
          stroke="currentColor"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <polyline points="16 18 22 12 16 6"></polyline>
          <polyline points="8 6 2 12 8 18"></polyline>
        </svg>
        DevJobs
      </h1>
      <nav>
        <a
          href="https://instagram.com/midu.dev"
          target="_blank"
          rel="noopener noreferrer"
          >Instagram</a
        >
        <!-- 
        IMPORTANTE: Cuando uses `target="_blank", es recomendable usar también `rel="noopener noreferrer"` por razones de seguridad y rendimiento.` 
        noopener: previene que la nueva página tenga acceso al objeto window.opener, mejorando la seguridad.
        noreferrer: previene que se envíe la información del referente (la URL de la página actual) a la nueva página.
        -->
        <a href="#">Inicio</a>
        <a href="#" target="_self">Empleos</a>
      </nav>
      <div>
        <!-- <a href="#">Publicar un empleo</a> -->
        <!-- <a href="#">Iniciar sesión</a> -->
         <devjobs-avatar
          service="x"
          username="oGuardiola_VH"
          size="24"
        ></devjobs-avatar>
        <devjobs-avatar
          service="github"
          username="HelixGuardi"
          size="32"
        ></devjobs-avatar>
      </div>
    </header>

    <main>
      <section class="jobs-search">
        <h1>Encuentra tu próximo trabajo</h1>
        <p>Explora miles de oportunidades en el sector tecnológico.</p>

        <form role="search">
          <div class="search-bar">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="icon icon-tabler icons-tabler-outline icon-tabler-search"
            >
              <path stroke="none" d="M0 0h24v24H0z" fill="none" />
              <path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" />
              <path d="M21 21l-6 -6" />
            </svg>

            <input
              required
              type="text"
              placeholder="Buscar trabajos, empresas o habilidades"
            />
          </div>

          <div class="search-filters">
            <!-- <select name="technology" id="filter-technology">
              <option value="">Tecnología</option>
              <optgroup label="Tecnologías populares">
                <option value="javascript">JavaScript</option>
                <option value="python">Python</option>
                <option value="react">React</option>
                <option value="nodejs">Node.js</option>
                <option value="mobile">Mobile</option>
              </optgroup>
              <hr/>
              <option value="java">Java</option>
              <hr/>
              <option value="csharp">C#</option>
              <option value="c">C</option>
              <option value="c++">C++</option>
              <hr/>
              <option value="ruby">Ruby</option>
              <option value="php">PHP</option>
            </select> -->
            <div class="custom-select" id="filter-technology">
              <button class="custom-select-trigger" type="button">
                <span class="custom-select-label">Tecnologías</span>
                <span class="custom-select-arrow"></span>
              </button>
              <div class="custom-select-dropdown">
                <!-- Aquí se renderizan los checkbox para cada opción de tecnología disponible -->
              </div>
            </div>

            <select name="location" id="filter-location">
              <option value="">Ubicación</option>
              <option value="remoto">Remoto</option>
              <option value="cdmx">Ciudad de México</option>
              <option value="guadalajara">Guadalajara</option>
              <option value="monterrey">Monterrey</option>
              <option value="barcelona">Barcelona</option>
            </select>

            <select name="experience-level" id="filter-experience-level">
              <option value="">Nível de experiencia</option>
              <option value="junior">Junior</option>
              <option value="mid">Mid-level</option>
              <option value="senior">Senior</option>
              <option value="lead">Lead</option>
            </select>
          </div>

          <!--  <p id="mensaje-filtro" style="margin-top: 1rem; color: var(--primary-light);"></p> -->
        </form>
      </section>

      <div class="search-result-header">
        <h2 class="basic-h2">Resultados de búsqueda</h2>
        <span id="available-offers-indicator">
          <!-- Aquí se inserta el indicador visual que muestra cuántos resultados se encontraron -->
        </span>
      </div>

      <div class="jobs-listings">
        <!-- Aquí se insertan los empleos dinámicamente -->
      </div>

      <nav class="pagination">
        <!-- Aquí se insertan los botones de navegación para la paginación -->
      </nav>
    </main>

    <footer>
      <small>&copy; 2025 DevJobs. Todos los derechos reservados.</small>
    </footer>
  </body>
</html>
