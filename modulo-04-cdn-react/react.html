<!-- Hyper Text Markup Language (HTML) -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevJobs - Empleos</title>
    <meta
      name="description"
      content="Listado con empleos y filtros para encontrar el trabajo de tus sueños."
    />
    <link rel="stylesheet" href="./styles.css" />

    <script type="module">
      import React from "https://esm.sh/react?dev";
      import ReactDOM from "https://esm.sh/react-dom/client?dev";

      window.React = React;
      window.ReactDOM = ReactDOM;
    </script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      //elemento de React
      const titulo = (
        <h1 style={{ color: "#09f" }}>Hola, Bienvenido a React.js</h1>
      );

      //componente de React
      function JobCard({ data, titulo, empresa, ubicacion, descripcion }) {
        const [isApplied, setIsApplied] = React.useState(false);

        function handleClick() {
          setIsApplied(!isApplied);
          alert(`Has aplicado al puesto: ${titulo}`);
        }

        const text = isApplied ? "Aplicado" : "Aplicar";
        const buttonClass = isApplied ? "is-applied" : "";

        return (
          <article
            className="job-listing-card"
            data-modalidad={data?.modalidad}
            data-nivel={data?.nivel}
            data-technology={data?.technology}
          >
            <div>
              <h3>{titulo}</h3>
              <small>
                {empresa} | {ubicacion}
              </small>
              <p>{descripcion}</p>
            </div>
            <button
              disabled={isApplied}
              className={`button-apply-job ${buttonClass}`}
              onClick={handleClick}
            >
              {text}
            </button>
          </article>
        );
      }

      function App() {
        return (
          <div className="jobs-listings">
            <JobCard
              titulo="Desarrollador Frontend"
              empresa="Tech Solutions Inc."
              ubicacion="Remoto"
              descripcion="Buscamos un desarrollador frontend con experiencia en React, TypeScript y Tailwind CSS."
              data={{
                modalidad: "remoto",
                nivel: "junior",
                technology: "react",
              }}
            />
            <JobCard
              titulo="Ingeniero de Software Senior"
              empresa="Data Driven Co."
              ubicacion="Ciudad de México"
              descripcion="Estamos buscando un ingeniero de software con experiencia en desarrollo web."
            />
          </div>
        );
      }

      const rootEl = document.querySelector("#root");
      const root = ReactDOM.createRoot(rootEl);
      root.render(<App />);
    </script>
  </head>
  <body>
    <header>
      <h1>
        <svg
          fill="none"
          stroke="currentColor"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <polyline points="16 18 22 12 16 6"></polyline>
          <polyline points="8 6 2 12 8 18"></polyline>
        </svg>
        DevJobs
      </h1>
      <nav>
        <a
          href="https://instagram.com/midu.dev"
          target="_blank"
          rel="noopener noreferrer"
          >Instagram</a
        >
        <a href="#">Inicio</a>
        <a href="#" target="_self">Empleos</a>
      </nav>
      <div>
        <devjobs-avatar
          service="github"
          username="HelixGuardi"
          size="32"
        ></devjobs-avatar>
      </div>
    </header>

    <main>
      <section class="jobs-search">
        <h1>React.js, primeros pasos</h1>
      </section>

      <section>
        <h2>Empleos disponibles</h2>
        <div id="root"></div>
      </section>
    </main>

    <footer>
      <small>&copy; 2025 DevJobs. Todos los derechos reservados.</small>
    </footer>
  </body>
</html>
